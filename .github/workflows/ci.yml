name: CI

on:
  push:
    tags:
      - never_run
      - '*'
    branches:
      - never_run  
      - '*'

permissions:
  contents: write
  checks: write

  actions: read
  issues: read
  packages: write
  pull-requests: read
  repository-projects: read
  statuses: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  release:
    runs-on: ubuntu-latest
    steps:
      - name: Tree
        run: tree
      - name: Build Changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: mikepenz/release-changelog-builder-action@v4
        id: github_release
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n<details>\n<summary>Uncategorized</summary>\n\n#{{UNCATEGORIZED}}\n</details>",
              "categories": [
                {
                    "title": "## 💬 Other",
                    "labels": ["other"]
                },
                {
                    "title": "## 📦 Dependencies",
                    "labels": ["dependencies"]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: mikepenz/action-gh-release@v1
        with:
          body: ${{steps.github_release.outputs.changelog}}
  build:
    needs:
      - release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [ backend ]
        target:
          - x86_64-unknown-linux-musl
        linker: [ dynamic ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - uses: dtolnay/rust-toolchain@stable


      - name: Find Version
        if: startsWith(github.ref, 'refs/tags/')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: image
          tags: type=semver,pattern={{version}}

      - name: Set Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sed -i'' "s/0\\.0\\.0-git/${{ steps.meta.outputs.version }}/" Cargo.lock

      - name: Install Cargo
        run: sudo apt install musl-tools -y

      - name: Add Target
        run: rustup target add ${{ matrix.target }}

      - name: Print PATH
        run: echo $PATH

      - name: Check Cargo Installation
        run: cargo --version

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mv target/${{ matrix.target }}/release/backend ${{ matrix.component }}_${{ matrix.target }}${{ env.NAME_PREFIX }}

      - name: Upload Artifact (Backend)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}_${{ matrix.target }}${{ env.NAME_PREFIX }}
          path: ${{ matrix.component }}_${{ matrix.target }}${{ env.NAME_PREFIX }}

      - name: Upload release binaries
        uses: alexellis/upload-assets@0.4.1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["${{ matrix.component }}_${{ matrix.target }}${{ env.NAME_PREFIX }}"]'

  build-docker:
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/edge' || startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        component: [ backend ]


    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Organize binaries
        run: |
          mkdir -p ctx/linux/amd64 ctx/linux/arm64 ctx/linux/arm/v7
          tree

          mv ${{ matrix.component }}_x86_64-unknown-linux-musl/${{ matrix.component }}_x86_64-unknown-linux-musl ctx/linux/amd64/backend-${{ matrix.component }}

          chmod +x ctx/linux/amd64/backend-${{ matrix.component }}

          tree ctx


      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/edge' }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.component }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.component }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile.actions
          context: ctx
          platforms: linux/amd64
          build-args: COMPONENT=${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
