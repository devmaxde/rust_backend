services:
  db:
    hostname: db
    image: postgres:17.6
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}

  backend:
    image: ghcr.io/devmaxde/rust_backend/backend:edge
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - backend
      - proxy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.service=backend_service"
      - "traefik.http.services.backend_service.loadbalancer.server.port=3000"
      - "traefik.http.routers.backend.rule=Host(`api.example.com`)"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=cloudflare"

networks:
  backend:
    driver: bridge
  proxy:
    external: true

volumes:
  db_data:
